{% extends 'base.html' %}

{% block content %}



<main class="container">

<div class="row">
    <div class="col-md-4 offset-md-4 mt-5">
        <form action="/signup/" method="post" class="card card-body ">
    <h1 class="text-center">SignUp</h1>
    {{error}}
    {% csrf_token %}
    
    <div class="mb-3">
        <label for="username">Username:</label>
        <input type="text" name="username" id="username" class="form-control" placeholder="Escribe tu usuario">
    </div>

    <div class="mb-3">
        <label for="password1">Contrasena:</label>
        <input type="password" name="password1" id="password1" class="form-control" placeholder="Escribe tu contrasena">
    </div>

    <div class="mb-3">
        <label for="password2">Confirma tu contrasena:</label>
        <input type="password" name="password2" id="password2" class="form-control" placeholder="Confirma tu contrasena">
    </div>


    <button class="btn btn-primary">
        Signup
    </button>
</form>
    </div>
</div>

</main>


{% endblock content %}
